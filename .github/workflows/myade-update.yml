name: Build and deploy website

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run MyADE pipeline
        working-directory: teaching/MyADE
        run: |
          chmod +x run_pipeline.sh
          ./run_pipeline.sh

      - name: Commit regenerated MyADE data
        run: |
          if git diff --quiet -- \
            teaching/MyADE/data/courses.json \
            teaching/MyADE/data/courses_complete.json \
            teaching/MyADE/data/import_report.json; then
            echo "No generated files changed."
          else
            git config user.name "github-actions[bot]"
            git config user.email \
              "41898282+github-actions[bot]@users.noreply.github.com"

            git add \
              teaching/MyADE/data/courses.json \
              teaching/MyADE/data/courses_complete.json \
              teaching/MyADE/data/import_report.json

            git commit -m "chore(MyADE): regenerate generated data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
