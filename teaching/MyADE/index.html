<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard for ADE teaching-service data">
  <title>ADE Teaching Dashboard</title>

  <script>
    (() => {
      const savedTheme = localStorage.getItem("ade-dashboard-theme");
      document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
    })();
  </script>

  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/filters.css">
  <link rel="stylesheet" href="./css/timeline.css">
  <link rel="stylesheet" href="./css/gantt.css">

  <script src="./vendor/plotly.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">ADE data explorer</p>
      <h1>ADE Teaching Dashboard</h1>
    </div>
    <div class="topbar-actions">
      <p id="data-status" class="data-status" aria-live="polite">Loading data…</p>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        role="switch"
        aria-checked="true"
        aria-label="Switch to light mode"
      >
        <span class="theme-toggle-track" aria-hidden="true">
          <span class="theme-toggle-thumb"></span>
        </span>
        <span id="theme-toggle-label" class="theme-toggle-label">Dark</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" aria-label="Dashboard views">
      <h2>Views</h2>
      <button class="nav-button active" type="button" data-view="summary" aria-current="page">
        Service summary
      </button>
      <button class="nav-button" type="button" data-view="timeline">
        Timeline
      </button>
      <button class="nav-button" type="button" data-view="gantt">
        Gantt diagram
      </button>
    </aside>

    <main class="content">
      <section class="page-heading">
        <div>
          <p class="eyebrow">Teaching service</p>
          <h2>Service summary</h2>
          <p class="page-description">
            Aggregated teaching hours and session counts by course and session type.
          </p>
        </div>
      </section>

      <section id="view-container" aria-live="polite">
        <div class="state-card">Loading dashboard…</div>
      </section>
    </main>
  </div>
</body>
</html>
